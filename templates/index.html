<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="card">

<h1>📊 Sentiment Dashboard</h1>

<form method="POST">

<textarea name="text"
placeholder="Enter text..."
required></textarea>

<button type="submit">Analyze</button>

</form>

{% if result %}

<div class="result">

<h2>{{ result }}</h2>

<p>Score: {{ score }}</p>

</div>

{% endif %}

<div class="stats">

<div class="box positive">
<h3>Positive</h3>
<p>{{ pos }}</p>
</div>

<div class="box negative">
<h3>Negative</h3>
<p>{{ neg }}</p>
</div>

<div class="box neutral">
<h3>Neutral</h3>
<p>{{ neu }}</p>
</div>

</div>

<div class="buttons">

<a href="/history">
<button>History</button>
</a>

<a href="/chart">
<button>Charts</button>
</a>

<a href="/upload">
<button>Upload CSV</button>
</a>

</div>

</div>

</body>
</html>
