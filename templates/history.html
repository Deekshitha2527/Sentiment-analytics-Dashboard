<!DOCTYPE html>
<html>
<head>
<title>History</title>
<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="card">

<h1>History</h1>

<table>

<tr>
<th>ID</th>
<th>Text</th>
<th>Sentiment</th>
<th>Score</th>
</tr>

{% for row in data %}

<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
